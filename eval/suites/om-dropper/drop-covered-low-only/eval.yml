id: om-dropper-drop-covered-low-only
kind: om_dropper
probes: []
dropper_input:
  targetTokens: 150
  reflections:
    - id: "ref111111111"
      content: Minor setup chatter was captured and is safe to compress away.
      supportingObservationIds: ["111111111111", "222222222222"]
      tokenCount: 14
  observations:
    - id: "111111111111"
      content: Minor setup chatter about opening the repo and listing files.
      timestamp: "2026-01-01 00:01"
      relevance: low
      sourceEntryIds: [u1]
      tokenCount: 100
    - id: "222222222222"
      content: Minor setup chatter about checking package scripts.
      timestamp: "2026-01-01 00:02"
      relevance: low
      sourceEntryIds: [u2]
      tokenCount: 100
    - id: "333333333333"
      content: User stated the canonical eval command must not use --force because cache/token comparisons would be invalid.
      timestamp: "2026-01-01 00:03"
      relevance: critical
      sourceEntryIds: [u3]
      tokenCount: 100
dropper_probe:
  id: drop_covered_low_only
  question: Did the dropper choose only low-relevance covered observations, preserving critical unique evidence?
  rubric:
    pass_if:
      - Drops one or both of `111111111111` and `222222222222`.
      - Does not drop `333333333333`.
    fail_if:
      - Drops critical unique observation `333333333333`.
      - Drops nothing despite the pool being over target and low covered observations being available.
