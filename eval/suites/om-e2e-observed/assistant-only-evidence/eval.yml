id: hard-assistant-only-evidence
kind: synthetic_hard_precompact_session
source_session: source.om-observed.synthetic.jsonl
notes: Exact evidence appears only in an assistant message, not repeated by the user.
compact_before_probe: true
compact_instructions: Preserve exact assertions, paths, line numbers, and any
  assistant-recorded evidence.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: assistant_recorded_assertion
    question: What exact assertion and file location did the assistant record? Use
      recall if needed.
    rubric:
      pass_if:
        - Gives `assert.deepStrictEqual(actual.tags, ["stable", "sdk"])`.
        - Gives `tests/tags.test.ts:92`.
        - Does not say INSUFFICIENT_CONTEXT.
      fail_if:
        - Says INSUFFICIENT_CONTEXT.
        - Invents a different assertion or location.
        - Gives only a vague tags assertion without exact path and line.
calibration:
  - id: good_exact
    expected_passed: true
    answer: The assistant recorded `assert.deepStrictEqual(actual.tags, ["stable",
      "sdk"])` at tests/tags.test.ts:92.
  - id: bad_insufficient
    expected_passed: false
    answer: INSUFFICIENT_CONTEXT
  - id: bad_vague
    expected_passed: false
    answer: It was a deepStrictEqual assertion about tags.
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-observational-memory
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
