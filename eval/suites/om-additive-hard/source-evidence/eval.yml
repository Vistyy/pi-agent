id: om-additive-source-evidence
kind: synthetic_hard_precompact_session
source_session: source.precompact.synthetic.jsonl
notes: Answer needs exact reason and source cue, not just final flag.
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, source evidence cues, and exact IDs/paths/timestamps. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: audit_source
    question: "What flag did Dana approve, why was the tempting alternative rejected, and what source evidence identifies this decision? Use recall if needed."
    rubric:
      pass_if:
        - Gives approved flag `--verify-index --batch=32`.
        - Says `--fast-index` was rejected because it skipped checksum validation.
        - Mentions `ARC-7781 comment 14`.
      fail_if:
        - Says `--fast-index` was approved.
        - Omits the rejection reason.
        - Invents a different ticket or comment.
calibration:
  - id: good
    expected_passed: true
    answer: "Dana approved --verify-index --batch=32. --fast-index was rejected because it skipped checksum validation in dry-run 7. Source: ARC-7781 comment 14."
  - id: bad_no_source
    expected_passed: false
    answer: "Dana approved --verify-index --batch=32 for safety."
