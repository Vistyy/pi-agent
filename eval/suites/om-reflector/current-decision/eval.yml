id: om-reflector-current-decision
kind: om_reflector
probes: []
reflector_input:
  observations:
    - id: "444444444444"
      content: User initially proposed append-only markdown as canonical memory because it is easy to audit.
      timestamp: "2026-01-01 00:01"
      relevance: medium
      sourceEntryIds: [u1]
      tokenCount: 16
    - id: "555555555555"
      content: User revised the decision so mutable current state is canonical and append-only markdown is only bounded audit/debug, not canonical.
      timestamp: "2026-01-01 00:05"
      relevance: critical
      sourceEntryIds: [u2]
      tokenCount: 24
reflector_probe:
  id: current_decision_reflection
  question: Did the reflector preserve the latest decision rather than the superseded proposal?
  rubric:
    pass_if:
      - Reflections state mutable current state is canonical.
      - Reflections state append-only markdown/logs are not canonical and only audit/debug.
      - Reflections cite supporting observation id `555555555555`.
    fail_if:
      - States or implies append-only markdown is canonical.
      - Omits the current mutable-state decision.
      - Records no reflection.
