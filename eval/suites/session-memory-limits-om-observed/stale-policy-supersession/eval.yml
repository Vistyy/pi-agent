id: session-memory-limits-stale-policy-supersession
kind: session_memory_limit
source_session: source.om-observed.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections,
  constraints, rejected stale options, and reasons. Prefer newer explicit
  corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: stale-policy-supersession_probe
    question: What is the current artifact storage policy? Mention whether
      tmp/eval-output is still valid.
    rubric:
      pass_if:
        - Answer says committed synthetic eval artifacts go under `eval/suites`.
        - Answer says generated run outputs go under `eval/runs` and are
          gitignored.
        - Answer says `tmp/eval-output` is rejected, stale, superseded, or
          otherwise not valid.
      fail_if:
        - Treats `tmp/eval-output` as current valid policy.
        - Omits `eval/suites`.
        - Omits generated runs under `eval/runs` and gitignored.
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-observational-memory
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
