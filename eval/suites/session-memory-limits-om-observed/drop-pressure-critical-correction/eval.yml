id: session-memory-limits-drop-pressure-critical-correction
kind: session_memory_limit
source_session: source.om-observed.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections,
  constraints, rejected stale options, and reasons. Prefer newer explicit
  corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: drop-pressure-critical-correction_probe
    question: Should benchmark comparisons use --force now? Include the reason.
    rubric:
      pass_if:
        - Answer says never/do not use `--force` in benchmark comparisons.
        - Answer includes cache and token comparisons are invalidated.
      fail_if:
        - Says `--force` may/should be used.
        - Omits cache/token invalidation reason.
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-observational-memory
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
