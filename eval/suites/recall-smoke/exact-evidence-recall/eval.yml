id: exact-evidence-recall
kind: synthetic_recall_session
source_session: source.precompact.synthetic.jsonl
notes: Tests whether pi-vcc recall can recover exact evidence from raw session history after compaction.
compact_before_probe: true
compact_instructions: __pi_vcc__
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: exact_assertion_recall
    question: What was the exact failing assertion and line number? Use recall if needed.
    rubric:
      pass_if:
        - Gives line 247.
        - Gives the exact assertion `expected "cache hit" but got "cache miss"`.
        - Does not say INSUFFICIENT_CONTEXT.
      fail_if:
        - Says INSUFFICIENT_CONTEXT.
        - Invents a different line number or assertion.
        - Gives only a vague description without exact line and assertion.
calibration:
  - id: good_exact
    expected_passed: true
    answer: 'Line 247: expected "cache hit" but got "cache miss".'
  - id: bad_insufficient
    expected_passed: false
    answer: INSUFFICIENT_CONTEXT
  - id: bad_vague
    expected_passed: false
    answer: It was a cache assertion failure somewhere in the test.
