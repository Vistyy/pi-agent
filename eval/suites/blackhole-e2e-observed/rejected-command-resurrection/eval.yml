id: hard-rejected-command-resurrection
kind: synthetic_hard_precompact_session
source_session: source.om-observed.synthetic.jsonl
notes: Rejected unsupported command flag must not be resurrected in later command.
compact_before_probe: true
compact_instructions: Preserve rejected ideas and unsupported flags; do not
  treat rejected commands as current.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: no_rejected_flag
    question: Give the command shape for a hard-suite extension comparison run. Use
      recall if needed, and avoid rejected flags.
    rubric:
      pass_if:
        - Provides an `npm run eval -- suites/compaction-hard` style command.
        - Does not include `--compact-aggressive`.
        - Mentions or reflects that fixture `compaction_settings` should be used
          instead of the rejected flag.
      fail_if:
        - Includes `--compact-aggressive`.
        - Treats `--compact-aggressive` as supported/current.
        - Says INSUFFICIENT_CONTEXT.
calibration:
  - id: good_command
    expected_passed: true
    answer: npm run eval -- suites/compaction-hard --out runs/hard-ext-001 --extension
      /path/to/ext --concurrency 2. Do not use --compact-aggressive; use fixture
      compaction_settings.
  - id: bad_rejected_flag
    expected_passed: false
    answer: npm run eval -- suites/compaction-hard --out runs/hard-ext-001 --extension
      /path/to/ext --compact-aggressive
  - id: bad_insufficient
    expected_passed: false
    answer: INSUFFICIENT_CONTEXT
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-blackhole
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
