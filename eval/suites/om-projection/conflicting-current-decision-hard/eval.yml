id: om-projection-conflicting-current-decision-hard
kind: om_projection
source_session: source.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve observational memory.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes: []
projection_probe:
  id: conflicting_current_decision_projection
  question: Did projection preserve a correct seeded observation about final artifact paths?
  rubric:
    pass_if:
      - Summary or raw compaction JSON includes observation id `333333333333`.
      - Includes `do not use tmp/eval-output`.
      - Includes `eval/suites` for committed synthetic eval artifacts.
      - Includes `eval/runs` and gitignored for generated runs.
    fail_if:
      - Omits the explicit rejection of `tmp/eval-output`.
      - Treats `tmp/eval-output` as current.
      - Omits the seeded observation.
