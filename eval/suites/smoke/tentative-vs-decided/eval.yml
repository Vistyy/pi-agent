id: tentative-vs-decided
kind: synthetic_session
source_session: source.synthetic.jsonl
notes: Tests that tentative ideas are not preserved as decisions after
  compaction when later rejected.
cut:
  compaction_entry_index: 4
  purpose: Evaluate whether the agent answers correctly from compacted session context.
probes:
  - id: memory_shape_decision
    question: What memory shape did we choose?
    rubric:
      pass_if:
        - Says rigid JSON or state-machine memory was rejected.
        - Says the chosen memory shape is LLM-readable markdown or prose.
        - Mentions deterministic mechanics or guardrails around the prose memory
          if giving details.
      fail_if:
        - Says JSON/state-machine memory was chosen.
        - Omits that the rigid structured approach was rejected.
calibration:
  - id: good_rejected_json
    expected_passed: true
    answer: We chose LLM-readable markdown/prose memory and explicitly rejected
      rigid JSON/state-machine memory. Deterministic mechanics can wrap the
      prose.
  - id: bad_json_chosen
    expected_passed: false
    answer: We chose a rigid JSON state machine with topic statuses as the memory
      format.
  - id: bad_omits_rejection
    expected_passed: false
    answer: Use markdown notes for memory because they are easy for the model to read.
