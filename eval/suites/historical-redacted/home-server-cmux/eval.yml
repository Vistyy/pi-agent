id: historical-redacted-home-server-cmux
kind: historical_redacted
source_session: source.precompact.redacted.jsonl
notes: Redacted/sliced from a real historical Pi session. Raw source remains private scratch.
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, tool-result facts, and unresolved states. Prefer newer explicit corrections over older hypotheses.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: cmux-bug-not-user-misconfig
    question: "What was the final diagnosis for the dead-space / bad resize behavior in cmux: a user misconfiguration, or a cmux remote PTY bug?"
    rubric:
      pass_if:
        - Answers that it was a cmux remote terminal/PTY propagation bug (not a user misconfig).
        - Mentions the UI could look full-size while the remote PTY stayed at 72x71 / 71x72.
      fail_if:
        - Says the issue was just Zellij layout or just font-size config.
        - Claims it was expected behavior after Cmd+0.
  - id: current-attached-pty-size
    question: "What exact PTY size was the live attached Pi/Zellij terminal using at the end?"
    rubric:
      pass_if:
        - Answers 71 rows by 72 cols (or 71x72).
        - Does not confuse it with the larger 75x145 or 75x292 shells.
      fail_if:
        - Gives 75x145, 75x292, or any other size.
        - Answers only with a vague 'small' or 'stale'.
  - id: cmux-ghostty-vs-cmux-zoom
    question: "According to the docs checked, where should terminal font size be changed: cmux config or Ghostty config?"
    rubric:
      pass_if:
        - Answers Ghostty config (e.g. ~/.config/ghostty/config or the Library/Application Support Ghostty config path).
        - Notes cmux.json is for app-owned settings, not terminal font sizing.
      fail_if:
        - Says cmux.json controls terminal font size.
        - Says browser/app zoom is the same thing as terminal font size.
  - id: zellij-not-the-culprit
    question: "What comparison with another terminal showed that Zellij itself was probably not the main problem?"
    rubric:
      pass_if:
        - Answers that Windows Terminal behaved much better than the Mac cmux terminal/wrapper.
        - Mentions this pointed to the Mac cmux terminal wrapper or PTY resize propagation, not Zellij.
      fail_if:
        - Says both terminals behaved the same.
        - Claims Windows Terminal also had the same dead-space issue.
  - id: stale-session-vs-fresh-session
    question: "What did the two shell commands show about the stale vs fresh terminal contexts?"
    rubric:
      pass_if:
        - Answers that one shell reported 54x115 while another reported 75x145.
        - Indicates the mismatch meant one PTY/client was stale while the other was fresh.
      fail_if:
        - Swaps the sizes.
        - Claims both shells reported the same geometry.
