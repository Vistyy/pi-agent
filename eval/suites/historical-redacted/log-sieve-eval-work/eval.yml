id: historical-redacted-log-sieve-eval-work
kind: historical_redacted
source_session: source.precompact.redacted.jsonl
notes: Redacted/sliced from a real historical Pi session. Raw source remains private scratch.
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, tool-result facts, and unresolved states. Prefer newer explicit corrections over older hypotheses.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: blackhole-observed-vs-forced-prep
    question: "What did the user want done after asking to \u2018do it now\u2019 about the blackhole benchmark, and what was the key distinction between the forced-prep run and the realistic blackhole-observed run?"
    rubric:
      pass_if:
        - Mentions the user wanted the realistic materialize-then-replay approach implemented now.
        - Mentions forced prep was an eval-only workaround / artificially replayed memory, not the realistic comparison.
        - Mentions blackhole-observed materializes memory once, then replays compact+answer with high observe threshold.
      fail_if:
        - Says the forced-prep run was the intended final approach.
        - Omits the distinction between backfill/forced prep and materialize+replay.
        - Confuses blackhole-observed with the earlier forced-prep blackhole run.
  - id: session-memory-benchmark-command-and-variants
    question: "What new command was added for the session-memory benchmark, and what variants does it support?"
    rubric:
      pass_if:
        - States the command is `npm run session-memory -- <variant> --out runs/name`.
        - Lists the supported variants: clean, om, vcc, blackhole, and blackhole-observed.
      fail_if:
        - Lists an unsupported variant.
        - Forgets the `session-memory` command name or the `--out` usage pattern.
  - id: blackhole-observed-results-and-failures
    question: "What were the reported results of the blackhole-observed replay run, including pass count, approximate token cost, and the failed fixtures/classes?"
    rubric:
      pass_if:
        - States the run passed 7/10.
        - States replay tokens were about 50,922 and combined rough total about 140,760.
        - Names the failed fixtures with their classes: long-noisy-100-turn wrong_stale_memory, temporal-expiry-current-rule rubric_or_answer_omission, unresolved-conflict-with-prior-final answer_use_failure.
      fail_if:
        - Uses the forced-prep blackhole numbers instead.
        - Misses any of the three failures or their classifications.
        - Gives materially wrong token totals or pass count.
  - id: real-session-eval-proper-shape
    question: "According to the discussion on how to evaluate real sessions properly, what is the evaluation shape and what are the key guardrails?"
    rubric:
      pass_if:
        - Describes the shape as historical session -> redacted/materialized fixture -> choose probe from pre-compaction facts -> compact -> ask probe -> semantic judge.
        - Mentions redacting secrets/tokens/private URLs and keeping structure/relevant paths.
        - Mentions the need to manually validate probes / no probe unless evidence supports it.
      fail_if:
        - Includes committing raw unredacted historical fixtures.
        - Suggests judging probes without human validation.
        - Omits the pre-compaction constraint on evidence.
  - id: current-read-on-memory-quality
    question: "What was the current conclusion about whether the memory systems improved quality on this suite compared with clean Pi?"
    rubric:
      pass_if:
        - Says memory extensions did not clearly improve quality over clean Pi.
        - States clean Pi was the strongest cost/quality baseline on this suite.
        - Notes that memory systems could be much more expensive.
      fail_if:
        - Claims memory clearly beat clean Pi.
        - Says the conclusion was that memory was definitely worth the cost on this suite.
  - id: historical-probe-miner-added
    question: "What new tool/script was added to mine probes from historical sessions, and what input/output shape did it use?"
    rubric:
      pass_if:
        - Names `src/historical-probe-miner.ts` or the `mine-historical` command.
        - States it takes a session JSONL file as input and writes candidate probes JSON output (plus raw text sidecar).
      fail_if:
        - Confuses it with the session-memory variant script.
        - Says it operates on live sessions instead of historical JSONL files.
