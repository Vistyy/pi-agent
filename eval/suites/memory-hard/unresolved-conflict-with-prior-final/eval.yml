id: session-memory-limits-unresolved-conflict-with-prior-final
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: unresolved-conflict-with-prior-final_probe
    question: "What is the current package publish path decision?"
    rubric:
      pass_if:
        - Answer says the decision is unresolved/not finalized.
        - Answer mentions both `dist/npm` and `build/package` as candidates.
        - Answer says prior `dist/npm` final decision should not be treated as current final policy, or equivalent.

      fail_if:
        - Says `dist/npm` is current final policy.
        - Says `build/package` is current final policy.
        - Omits that the decision was reopened/unresolved.

