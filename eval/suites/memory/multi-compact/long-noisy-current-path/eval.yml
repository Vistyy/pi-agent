id: multi-compact-long-noisy-current-path
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "From the long prior session, answer the record for: payments reconcile runbook. Include the exact current detail and mention the stale near-match that must not be used."
    rubric:
      pass_if:
        - "Includes exact current detail: docs/runbooks/payments/reconcile-v4.md current; v3 archived; payment/ typo invalid"
        - "Identifies stale/wrong near-match: docs/runbooks/payment/reconcile-v4.md"
      fail_if:
        - "Uses stale near-match as current: docs/runbooks/payment/reconcile-v4.md"
        - "Says INSUFFICIENT_CONTEXT"
