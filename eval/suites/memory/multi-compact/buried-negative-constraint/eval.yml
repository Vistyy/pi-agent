id: multi-compact-buried-negative-constraint
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "From the long prior session, answer the record for: emergency webhook target. Include the exact current URL and mention the old URL that must not be used."
    rubric:
      pass_if:
        - "Includes exact current URL: https://hooks.prod.example/v2/incidents?channel=sev1"
        - "Identifies old URL not to use: https://hooks.old.example/alpha"
      fail_if:
        - "Uses https://hooks.old.example/alpha as current"
        - "Says INSUFFICIENT_CONTEXT"
