id: multi-compact-multi-hop-artifact-path
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "From the long prior session, answer the record for: schema bundle mapping. Include the exact current detail and mention the stale near-match that must not be used."
    rubric:
      pass_if:
        - "Includes exact current detail: schema-bundle-44 -> out/generated/schemas/customer-v3.schema.json"
        - "Identifies stale/wrong near-match: schema-bundle-43 -> out/generated/schemas/customer-v2.schema.json"
      fail_if:
        - "Uses stale near-match as current: schema-bundle-43 -> out/generated/schemas/customer-v2.schema.json"
        - "Says INSUFFICIENT_CONTEXT"
