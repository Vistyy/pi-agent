id: discriminator-tool-result-over-paraphrase
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: digest
    question: "From the prior session, what is the source-backed digest for @acme/payments-worker? Mention the wrong assistant paraphrase that must not be used."
    rubric:
      pass_if:
        - "Includes exact source-backed digest sha256:9f31c0aa77bd"
        - "Identifies wrong paraphrase sha256:9f31c0aa77db as not to use"
      fail_if:
        - "Uses sha256:9f31c0aa77db as current/correct digest"
        - "Says INSUFFICIENT_CONTEXT"
