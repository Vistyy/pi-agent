id: om-consolidation-e2e-stale-memory-dominance
kind: om_consolidation
probes: []
consolidation_input:
  priorObservations:
    - { id: aaaaaaaa1001, content: "Earlier decision: deploy previews use the preview-old cluster.", timestamp: "2026-01-01 00:00", relevance: high, sourceEntryIds: [old1], tokenCount: 12 }
    - { id: aaaaaaaa1002, content: "Earlier note: preview-old was wired into the deploy script.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old2], tokenCount: 12 }
    - { id: aaaaaaaa1003, content: "Earlier note: docs referenced preview-old for temporary QA.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old3], tokenCount: 11 }
    - { id: aaaaaaaa1004, content: "Earlier note: preview-old had the last passing smoke test.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old4], tokenCount: 12 }
    - { id: aaaaaaaa1005, content: "Earlier note: team expected preview-old to remain default.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old5], tokenCount: 11 }
  priorReflections:
    - id: bbbbbbbb1001
      content: "Deploy previews should use the preview-old cluster."
      supportingObservationIds: [aaaaaaaa1001, aaaaaaaa1002, aaaaaaaa1003, aaaaaaaa1004, aaaaaaaa1005]
      tokenCount: 10
  sourceEntries:
    - id: u1
      role: user
      timestamp: "2026-01-01 00:01"
      text: "Correction: preview-old is deprecated and must not be used. Current deploy previews must use preview-green only."
    - id: u2
      role: user
      timestamp: "2026-01-01 00:02"
      text: "Reason: preview-old points at stale feature flags; preview-green has the current flag set."
  targetTokens: 1000
e2e_probe:
  id: stale_memory_dominance_e2e
  question: Which cluster should deploy previews use now, and what should not be used?
  rubric:
    pass_if:
      - Answer says deploy previews use `preview-green` now.
      - Answer says `preview-old` must not be used or is deprecated/stale.
    fail_if:
      - Says `preview-old` is current/default.
      - Omits `preview-green`.
      - Omits that `preview-old` is invalid/deprecated/stale.
e2e_memory_probe:
  id: stale_memory_dominance_memory
  question: Does the memory artifact preserve the preview-green correction and stale-feature-flag reason?
  rubric:
    pass_if:
      - Memory artifact says deploy previews use `preview-green` now.
      - Memory artifact says `preview-old` must not be used or is deprecated/stale.
      - Memory artifact includes stale feature flags as the reason.
    fail_if:
      - Memory artifact says `preview-old` is current/default.
      - Memory artifact omits `preview-green`.
      - Memory artifact omits stale feature flags.
