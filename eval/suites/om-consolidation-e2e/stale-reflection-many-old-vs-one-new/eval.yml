id: om-consolidation-e2e-stale-reflection-many-old-vs-one-new
kind: om_consolidation
probes: []
consolidation_input:
  priorObservations:
    - { id: aaaaaaaa2001, content: "Old decision: use legacy-indexer for search indexing.", timestamp: "2026-01-01 00:00", relevance: high, sourceEntryIds: [old1], tokenCount: 10 }
    - { id: aaaaaaaa2002, content: "Old note: legacy-indexer was fastest in prior benchmark.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old2], tokenCount: 10 }
    - { id: aaaaaaaa2003, content: "Old note: legacy-indexer had docs already written.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old3], tokenCount: 10 }
    - { id: aaaaaaaa2004, content: "Old note: legacy-indexer matched old deploy scripts.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old4], tokenCount: 10 }
    - { id: aaaaaaaa2005, content: "Old note: legacy-indexer was expected by QA.", timestamp: "2026-01-01 00:00", relevance: medium, sourceEntryIds: [old5], tokenCount: 10 }
  priorReflections:
    - { id: bbbbbbbb2001, content: "Search indexing should use legacy-indexer.", supportingObservationIds: [aaaaaaaa2001, aaaaaaaa2002], tokenCount: 8 }
    - { id: bbbbbbbb2002, content: "legacy-indexer is the established/default search indexing path.", supportingObservationIds: [aaaaaaaa2003, aaaaaaaa2004, aaaaaaaa2005], tokenCount: 10 }
  sourceEntries:
    - id: u1
      role: user
      timestamp: "2026-01-01 00:01"
      text: "Final correction: legacy-indexer is banned for current search indexing because it drops unicode tokens. Use vector-indexer only."
  targetTokens: 1000
e2e_probe:
  id: stale_reflection_many_old_vs_one_new_e2e
  question: What search indexing path should be used now, and what old path is invalid?
  rubric:
    pass_if:
      - Answer says use `vector-indexer` only.
      - Answer says `legacy-indexer` is banned/invalid/stale.
      - Answer includes that legacy-indexer drops unicode tokens.
    fail_if:
      - Says `legacy-indexer` is current/default.
      - Omits `vector-indexer`.
      - Omits unicode-token loss reason.
e2e_memory_probe:
  id: stale_reflection_many_old_vs_one_new_memory
  question: Does memory preserve that one newer correction supersedes multiple old legacy-indexer reflections?
  rubric:
    pass_if:
      - Memory artifact says use `vector-indexer` only.
      - Memory artifact says `legacy-indexer` is banned/invalid/stale.
      - Memory artifact includes that legacy-indexer drops unicode tokens.
    fail_if:
      - Memory artifact treats `legacy-indexer` as current/default without supersession.
      - Memory artifact omits `vector-indexer`.
      - Memory artifact omits unicode-token loss reason.
