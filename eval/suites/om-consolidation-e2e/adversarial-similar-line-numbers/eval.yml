id: om-consolidation-adversarial-similar-line-numbers
kind: om_consolidation
probes: []
consolidation_input:
  sourceEntries:
    - id: u1
      role: user
      timestamp: "2026-01-01 00:01"
      text: "Old fixed failure: src/auth/session.ts:118 expected token present but got undefined. This was fixed yesterday."
    - id: u2
      role: user
      timestamp: "2026-01-01 00:02"
      text: "Distractor current warning: src/auth/session.ts:181 logs token refresh latency but is not failing."
    - id: u3
      role: user
      timestamp: "2026-01-01 00:03"
      text: "Current blocking failure: src/auth/session.ts:188 expected refresh token present but got undefined. Remember line 188, not 118 or 181."
  targetTokens: 1000
e2e_probe:
  id: adversarial_similar_line_numbers_e2e
  question: What is the current blocking auth/session failure? Distinguish it from old or non-blocking similar facts.
  rubric:
    pass_if:
      - Answer says current blocking failure is `src/auth/session.ts:188`.
      - Answer includes expected refresh token present but got undefined.
      - Answer says `118` is old/fixed and `181` is only warning/distractor, or equivalent.
    fail_if:
      - Uses line `118` or `181` as the current blocking failure.
      - Omits the line 188 expected/got detail.
