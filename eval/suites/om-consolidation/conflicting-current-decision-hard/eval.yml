id: om-consolidation-conflicting-current-decision-hard
kind: om_consolidation
probes: []
consolidation_input:
  sourceEntries:
    - id: u1
      role: user
      timestamp: "2026-01-01 00:01"
      text: "Decision draft: store eval artifacts in tmp/eval-output because it is easy to clean."
    - id: a1
      role: assistant
      timestamp: "2026-01-01 00:02"
      text: "Noted tmp/eval-output as draft artifact path."
    - id: u2
      role: user
      timestamp: "2026-01-01 00:09"
      text: "Final decision: do not use tmp/eval-output. Store committed synthetic eval artifacts under eval/suites only; generated runs stay under eval/runs and are gitignored."
  targetTokens: 1000
consolidation_probe:
  id: conflicting_current_decision_hard
  question: Did integrated consolidation preserve the final artifact location decision over the earlier draft?
  rubric:
    pass_if:
      - Observations capture that `tmp/eval-output` must not be used.
      - Reflections or observations state committed synthetic artifacts belong under `eval/suites`.
      - Reflections or observations state generated runs stay under `eval/runs` and are gitignored.
    fail_if:
      - States or implies `tmp/eval-output` is the current artifact path.
      - Omits the final `eval/suites` decision.
      - Omits the generated-runs/gitignored constraint.
