id: om-consolidation-current-decision-not-stale
kind: om_consolidation
probes: []
consolidation_input:
  sourceEntries:
    - id: u1
      role: user
      timestamp: "2026-01-01 00:01"
      text: "Initial idea: use append-only markdown as canonical project memory."
    - id: u2
      role: user
      timestamp: "2026-01-01 00:05"
      text: "Correction: mutable current state is canonical. Append-only markdown is only bounded audit/debug, not canonical."
  targetTokens: 1000
consolidation_probe:
  id: current_decision_pipeline
  question: Did integrated consolidation preserve latest decision over stale proposal?
  rubric:
    pass_if:
      - Observations capture the correction that mutable current state is canonical.
      - Reflections state mutable current state is canonical and append-only markdown is only audit/debug or not canonical.
      - Does not state append-only markdown is canonical as current state.
    fail_if:
      - Keeps only the initial append-only markdown proposal.
      - Reverses the decision.
      - Drops the corrected decision observation.
