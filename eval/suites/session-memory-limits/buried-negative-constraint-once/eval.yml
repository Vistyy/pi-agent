id: session-memory-limits-buried-negative-constraint-once
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: buried-negative-constraint-once_probe
    question: "What is the current tenant migration rule by region? Include the negative constraint."
    rubric:
      pass_if:
        - Answer says EU tenants must not use auto-migrate / require manual opt-in.
        - Answer says US tenants can auto-migrate on first login.
        - Answer says APAC tenants can auto-migrate on first login.
        - Answer identifies the EU rule as legal/manual opt-in, not an implementation preference.
      fail_if:
        - Says all tenants can auto-migrate.
        - Says EU can auto-migrate.
        - Omits US or APAC allowed behavior.
        - Omits legal/manual opt-in reason for EU.
