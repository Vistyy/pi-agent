id: session-memory-limits-long-noisy-100-turn
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: long-noisy-100-turn_probe
    question: "What is the current cache failure, exact file/line, repro id, and final mitigation? Also name rejected/non-fixes."
    rubric:
      pass_if:
        - Answer includes `packages/web/src/session-cache.ts:88`.
        - Answer includes repro id `SC-8841`.
        - Answer says beta/workspace beta data is returned to alpha/workspace alpha after account switch.
        - Answer says mitigation is clearing session-cache entries on account switch and adding a workspace-id guard before reuse.
        - Answer says TTL increase is rejected or not the fix.
        - Answer says `docs/cache.md` is not the bug/non-fix.
        - Answer does not treat `packages/api/src/cache.ts:312` as current.
      fail_if:
        - Uses `packages/api/src/cache.ts:312` as current bug.
        - Omits `SC-8841`.
        - Omits account switch or beta-to-alpha workspace data leak.
        - Recommends TTL increase.
        - Treats docs/cache.md as bug.
