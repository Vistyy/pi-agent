id: session-memory-limits-long-noisy-100-turn
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: long-noisy-100-turn_probe
    question: "What is the current production cache failure and final mitigation? Include important non-fixes."
    rubric:
      pass_if:
        - Answer includes `packages/api/src/cache.ts:312`.
        - Answer says tenant A data is returned for tenant B after workspace switch.
        - Answer says final mitigation is invalidate cache on workspace switch.
        - Answer says not to fix `docs/cache.md`, or that it is unrelated.
        - Answer does not choose TTL increase or retry logic as the fix.

      fail_if:
        - Uses `src/cache.ts` or `docs/cache.md` as the current production bug location.
        - Omits the tenant A/tenant B workspace-switch detail.
        - Recommends TTL increase or retry logic as the final mitigation.

