id: session-memory-limits-temporal-expiry-current-rule
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: temporal-expiry-current-rule_probe
    question: "What is the current feature-flag expiry rule, including Helix and security emergency flags?"
    rubric:
      pass_if:
        - Answer says all feature flags, including Helix, expire after 14 days.
        - Answer says Helix 90-day exception was cancelled/stale/not current.
        - Answer says security emergency flags can last 72 hours maximum.
        - Answer includes naming requirement `sec-emergency-*`.
        - Answer does not present 30 days as current.
      fail_if:
        - Says regular flags expire after 30 days as current.
        - Says Helix can last 90 days as current.
        - Omits security emergency 72-hour maximum.
        - Omits `sec-emergency-*`.
