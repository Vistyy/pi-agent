id: session-memory-limits-same-symbol-across-packages
kind: session_memory_limit
source_session: source.precompact.synthetic.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: same-symbol-across-packages_probe
    question: "Which validateSession bug is current, which similarly named paths are stale/wrong, and what is the final fix/test?"
    rubric:
      pass_if:
        - Answer says current bug is in `apps/web/src/auth/session.ts`.
        - Answer says expired refresh tokens are accepted when clock skew is negative.
        - Answer includes assertion/rule that refresh token exp must be greater than serverNowMinusSkew, or equivalent.
        - Answer says `apps/admin/src/auth/session.ts` is closed/stale/not current.
        - Answer says `packages/auth/src/session.ts` is rejected/wrong/not the fix target.
        - Answer says final fix is negative-skew expiry guard and test `apps/web/src/auth/session.test.ts` `expired-refresh-negative-skew`.
      fail_if:
        - Chooses `apps/admin/src/auth/session.ts` as current.
        - Chooses `packages/auth/src/session.ts` as fix target.
        - Omits negative clock skew/expired refresh token detail.
        - Omits regression test path/name.
