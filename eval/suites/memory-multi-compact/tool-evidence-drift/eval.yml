id: multi-tool-evidence-drift
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "What exact CI failure line and token mismatch should be cited?"
    rubric:
      pass_if:
        - "Cites cache_refresh_test.go:318."
        - "Says expected \"shard-v7\" but got \"shard-v6\"."
      fail_if:
        - "Uses line 281."
        - "Uses shard-v5 as the failure token."
