id: multi-rejected-command-drift
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
compact_before_probe: true
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "Which dbctl command is rejected, and which command may be suggested?"
    rubric:
      pass_if:
        - "Identifies `dbctl promote --cluster blue --force` as rejected/never run."
        - "Identifies `dbctl promote --cluster green --verify-only` as allowed/suggestable."
      fail_if:
        - "Suggests running the blue --force command."
        - "Fails to distinguish blue force from green verify-only."
