id: multi-compact-current-rule-temporal-expiry
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "From the long prior session, answer the record for: feature flag triage. List the approved flag, unresolved flag, and rejected flag with exact status details."
    rubric:
      pass_if:
        - "Approved: SEARCH_INDEX_DELTA for canary cohort c-17 after PR #8821"
        - "Unresolved: BILLING_RETRY_V3 pending load test LT-447"
        - "Rejected: AUTH_SHADOW_LOGIN disabled because it bypasses audit trail"
      fail_if:
        - "Marks BILLING_RETRY_V3 approved or rejected"
        - "Marks AUTH_SHADOW_LOGIN approved/current"
        - "Omits one of the three required statuses"
        - "Says INSUFFICIENT_CONTEXT"
