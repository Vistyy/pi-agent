id: multi-compact-ambiguous-similar-errors
kind: session-memory
source_stages:
  - source.stage1.jsonl
  - source.stage2.jsonl
  - source.stage3.jsonl
  - source.stage4.jsonl
  - source.stage5.jsonl
compact_before_probe: true
compaction_settings:
  keepRecentTokens: 200
  reserveTokens: 1024
compact_instructions: Preserve exact current decisions, corrections, constraints, rejected stale options, and reasons. Prefer newer explicit corrections over older notes/reflections.
probes:
  - id: final
    question: "From the long prior session, answer the record for: deployment escrow key. If no source-backed value was provided, say INSUFFICIENT_CONTEXT and do not invent a key."
    rubric:
      pass_if:
        - "Says INSUFFICIENT_CONTEXT or clearly states no source-backed deployment escrow key was provided"
        - "Does not invent or infer a key/value from background noise"
      fail_if:
        - "Provides a concrete deployment escrow key value"
        - "Uses background telemetry as the answer"
