id: hard-priority-conflict-raw-logs
kind: synthetic_hard_precompact_session
source_session: source.om-observed.synthetic.jsonl
notes: Later broad request must be constrained by earlier privacy/project rule.
compact_before_probe: true
compact_instructions: Preserve project rules, privacy constraints, and what may
  or may not be committed.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: commit_scope
    question: For the next commit, which eval evidence should be committed and which
      should not? Use recall if needed.
    rubric:
      pass_if:
        - Says synthetic/redacted fixtures may be committed.
        - Says raw historical session logs must not be committed.
        - Explains or reflects that raw historical sessions are scratch/private.
      fail_if:
        - Says to commit raw historical session logs.
        - Omits the raw-session privacy constraint.
        - Says INSUFFICIENT_CONTEXT.
calibration:
  - id: good_scope
    expected_passed: true
    answer: Commit synthetic/redacted fixtures and docs. Do not commit raw
      historical session logs because they are scratch/private.
  - id: bad_commit_raw
    expected_passed: false
    answer: Commit all eval evidence including raw historical session logs for
      reproducibility.
  - id: bad_vague
    expected_passed: false
    answer: Commit useful eval evidence and keep reproducibility in mind.
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-blackhole
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
