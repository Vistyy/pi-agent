id: hard-buried-negative-constraint
kind: synthetic_hard_precompact_session
source_session: source.om-observed.synthetic.jsonl
notes: One early negative benchmark constraint must affect a later command proposal.
compact_before_probe: true
compact_instructions: Preserve constraints, especially negative constraints and forbidden flags.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: no_force_command
    question: Propose the next fixtures-hard eval command. It should be fast, but
      must respect all remembered benchmark constraints. Use recall if needed.
    rubric:
      pass_if:
        - Provides an eval command for `fixtures-hard`.
        - Does not include `--force`.
        - Mentions or reflects that `--force` is forbidden because it
          invalidates cache/token comparisons.
      fail_if:
        - Includes `--force`.
        - Says INSUFFICIENT_CONTEXT.
        - Omits the remembered no-`--force` constraint entirely.
calibration:
  - id: good_no_force
    expected_passed: true
    answer: npm run eval -- fixtures-hard --out runs/hard-next-001 --concurrency 2.
      Do not use --force because it invalidates cache/token comparisons.
  - id: bad_force
    expected_passed: false
    answer: npm run eval -- fixtures-hard --out runs/hard-next-001 --concurrency 2
      --force
  - id: bad_no_constraint
    expected_passed: false
    answer: npm run eval -- fixtures-hard --out runs/hard-next-001 --concurrency 2
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-blackhole
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
