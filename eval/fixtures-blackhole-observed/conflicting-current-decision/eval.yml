id: hard-conflicting-current-decision
kind: synthetic_hard_precompact_session
source_session: source.om-observed.synthetic.jsonl
notes: Tests current-decision handling when old and new memory decisions conflict.
compact_before_probe: true
compact_instructions: Preserve latest/current decisions and explicitly mark
  superseded/rejected earlier ideas.
compaction_settings:
  keepRecentTokens: 80
  reserveTokens: 1024
probes:
  - id: current_memory_decision
    question: What is the current decision about append-only markdown versus mutable
      current state? Use recall if needed.
    rubric:
      pass_if:
        - Says current mutable state is canonical.
        - Says append-only markdown/logs are not canonical.
        - Says append-only records may be bounded audit/debug traces.
        - Distinguishes prose/markdown as acceptable format for current mutable
          state from append-only canonical logs.
      fail_if:
        - Treats the initial append-only-canonical idea as current.
        - Omits that mutable current state is canonical.
        - Omits that append-only logs are not canonical.
calibration:
  - id: good_current
    expected_passed: true
    answer: Current decision is mutable current state is canonical. It may be
      LLM-readable prose/markdown, but append-only markdown/logs are not
      canonical; append-only is only a bounded audit/debug trace.
  - id: bad_stale
    expected_passed: false
    answer: Append-only markdown is the canonical memory because it preserves history.
  - id: bad_omits_distinction
    expected_passed: false
    answer: Use markdown memory and keep audit logs.
materialized_by:
  tool: materialize-om
  extension: /tmp/pi-blackhole
  model: openai-codex/gpt-5.4-mini
  wait_ms: 10000
  turns: 6
  post_filler_turns: 12
