id: rejected-path-resurrection
probes:
  - id: append_only_rejected
    question: Should append-only markdown be canonical memory?
    must_contain:
      - append-only
      - not canonical
      - mutable current state
      - audit/debug
    rubric:
      pass_if:
        - Says append-only markdown/logs are not canonical memory.
        - Says mutable current state is canonical.
        - Says append-only records may be bounded audit/debug traces.
      fail_if:
        - Says or implies append-only markdown should be canonical.
        - Omits the mutable current-state decision.
