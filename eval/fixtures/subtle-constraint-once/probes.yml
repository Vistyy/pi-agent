id: subtle-constraint-once
probes:
  - id: cost_constraint
    question: What constraints should shape eval design?
    must_contain:
      - cost
      - model
      - deterministic
      - cheap
    rubric:
      pass_if:
        - Says eval design should be cost-sensitive or cheap.
        - Says avoid big-model/model-heavy eval loops unless needed.
        - Says prefer deterministic or cheap baseline checks first.
      fail_if:
        - Recommends model-heavy evals as the default.
        - Omits the cost constraint or cheaper-plan constraint.
        - Only says to evaluate cleanly/one-by-one without mentioning cost, cheap checks, or avoiding model-heavy eval loops.
